name: Collect and deliver all public sources

on:
  workflow_dispatch:
  schedule:
    # Beijing 06:17 / 12:17 / 18:17 / 00:17, after each formal cutoff.
    - cron: "17 4,10,16,22 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r collector/requirements.txt
      - run: python -m unittest discover -s collector/tests -p "test_*.py"
      - id: google_auth
        name: Authenticate to Google Cloud for GH Archive
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          access_token_lifetime: 3600s
          workload_identity_provider: ${{ secrets.VAULT2077_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.VAULT2077_GCP_SERVICE_ACCOUNT }}
      - name: Collect every registered source and deliver unified batches
        run: npm run acquisition:collect
        env:
          GITHUB_TOKEN: ${{ secrets.VAULT2077_GITHUB_READ_TOKEN || github.token }}
          VAULT2077_COLLECTOR_OUTPUT_DIR: .collector-output
          VAULT2077_DOMESTIC_ACQUISITION_URL: ${{ secrets.VAULT2077_DOMESTIC_ACQUISITION_URL }}
          VAULT2077_DOMESTIC_ACQUISITION_PROCESS_URL: ${{ secrets.VAULT2077_DOMESTIC_ACQUISITION_PROCESS_URL }}
          VAULT2077_PIPELINE_SHARED_SECRET: ${{ secrets.VAULT2077_PIPELINE_SHARED_SECRET }}
          VAULT2077_PIPELINE_WORKER_SECRET: ${{ secrets.VAULT2077_PIPELINE_WORKER_SECRET }}
          VAULT2077_REQUIRE_DOMESTIC_DELIVERY: "true"
          VAULT2077_SMITHERY_API_KEY: ${{ secrets.VAULT2077_SMITHERY_API_KEY }}
          VAULT2077_GHARCHIVE_BIGQUERY_PROJECT: ${{ secrets.VAULT2077_GHARCHIVE_BIGQUERY_PROJECT }}
          VAULT2077_GHARCHIVE_BIGQUERY_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
      - name: Preserve packets and collection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vault2077-collector-${{ github.run_id }}-${{ github.run_attempt }}
          path: .collector-output
          if-no-files-found: warn
          retention-days: 14
