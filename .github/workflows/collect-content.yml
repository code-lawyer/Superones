name: Collect public content

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r collector/requirements.txt
      - run: python collector/feed_collector.py
        env:
          VAULT2077_FEED_ALLOWLIST_FILE: config/feed-sources.json
          VAULT2077_FEED_ALLOWLIST_JSON: ${{ secrets.VAULT2077_FEED_ALLOWLIST_JSON }}
          VAULT2077_RSS_DOCUMENTS_FILE: .collector-rss.json
      - run: node scripts/overseas-collector.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.VAULT2077_GITHUB_READ_TOKEN }}
          VAULT2077_TRENDING_API_URL: ${{ secrets.VAULT2077_TRENDING_API_URL }}
          VAULT2077_RELEASE_REPOSITORIES: ${{ vars.VAULT2077_RELEASE_REPOSITORIES }}
          VAULT2077_RSS_DOCUMENTS_FILE: .collector-rss.json
          VAULT2077_DOMESTIC_INGEST_URL: ${{ secrets.VAULT2077_DOMESTIC_INGEST_URL }}
          VAULT2077_PIPELINE_SHARED_SECRET: ${{ secrets.VAULT2077_PIPELINE_SHARED_SECRET }}
