name: Collect public content

on:
  workflow_dispatch:
  schedule:
    # Beijing 06:17 / 12:17 / 18:17 / 00:17, after each formal cutoff.
    - cron: "17 4,10,16,22 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r collector/requirements.txt
      - run: python -m unittest discover -s collector/tests -p "test_*.py"
      - run: python -m collector.horizon_raw_export
        env:
          GITHUB_TOKEN: ${{ secrets.VAULT2077_GITHUB_READ_TOKEN || github.token }}
          VAULT2077_SOURCE_BUNDLE_FILE: config/source-bundle.json
          VAULT2077_COLLECTOR_OUTPUT_DIR: .collector-output
          VAULT2077_DOMESTIC_INGEST_URL: ${{ secrets.VAULT2077_DOMESTIC_INGEST_URL }}
          VAULT2077_DOMESTIC_PROCESS_URL: ${{ secrets.VAULT2077_DOMESTIC_PROCESS_URL }}
          VAULT2077_PIPELINE_SHARED_SECRET: ${{ secrets.VAULT2077_PIPELINE_SHARED_SECRET }}
      - name: Capture official SiC model snapshots
        id: sic_snapshot
        continue-on-error: true
        env:
          VAULT2077_SIC_SNAPSHOT_URL: ${{ secrets.VAULT2077_SIC_SNAPSHOT_URL }}
          VAULT2077_SIC_COLLECTOR_SECRET: ${{ secrets.VAULT2077_SIC_COLLECTOR_SECRET }}
        run: |
          if [ -z "$VAULT2077_SIC_SNAPSHOT_URL" ] || [ -z "$VAULT2077_SIC_COLLECTOR_SECRET" ]; then
            echo "SiC snapshot endpoint is not configured; skipping."
            exit 0
          fi
          response=$(curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer $VAULT2077_SIC_COLLECTOR_SECRET" \
            "$VAULT2077_SIC_SNAPSHOT_URL")
          echo "$response"
          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "SiC snapshot collection completed with partial failures."
            exit 1
          fi
      - name: Collect approved SiC fixed sources
        id: sic_content
        continue-on-error: true
        env:
          VAULT2077_SIC_CONTENT_URL: ${{ secrets.VAULT2077_SIC_CONTENT_URL }}
          VAULT2077_SIC_COLLECTOR_SECRET: ${{ secrets.VAULT2077_SIC_COLLECTOR_SECRET }}
        run: |
          if [ -z "$VAULT2077_SIC_CONTENT_URL" ] || [ -z "$VAULT2077_SIC_COLLECTOR_SECRET" ]; then
            echo "SiC content endpoint is not configured; skipping."
            exit 0
          fi
          node --conditions=react-server --experimental-strip-types scripts/collect-sic-overseas.ts .collector-output/sic-content.json
          response=$(curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer $VAULT2077_SIC_COLLECTOR_SECRET" \
            --header "Content-Type: application/json" \
            --data-binary @.collector-output/sic-content.json \
            "$VAULT2077_SIC_CONTENT_URL")
          echo "$response"
          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "SiC fixed-source collection completed with partial failures."
            exit 1
          fi
      - name: Preserve packets and collection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vault2077-collector-${{ github.run_id }}-${{ github.run_attempt }}
          path: .collector-output
          if-no-files-found: warn
          retention-days: 14
      - name: Report SiC partial failures
        if: always() && (steps.sic_snapshot.outcome == 'failure' || steps.sic_content.outcome == 'failure')
        run: |
          echo "One or more SiC collectors reported a partial failure. Inspect the responses and artifact."
          exit 1
